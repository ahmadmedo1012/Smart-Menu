name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22.x"

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: smart-menu-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run build

      - name: Check for committed .env files
        run: |
          STAGED=$(git ls-files '.env' '.env.local' '.env.prod' '.env.development')
          if [ -n "$STAGED" ]; then
            echo "❌ SECURITY BLOCKED: .env files are tracked:"
            echo "$STAGED"
            exit 1
          fi

      # Unit tests — no DB needed
      - run: npm test
        env:
          TELEGRAM_BOT_TOKEN: "test"
          TELEGRAM_CHAT_ID: "0"

      # Start dev server for E2E tests (always runs, uses CI Postgres service)
      - name: Start dev server
        run: |
          npm run build
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000

      # E2E tests against localhost (not production).
      # DB-backed via the CI Postgres service at top of this job.
      - name: E2E tests
        run: npx playwright install --with-deps chromium && npm run test:e2e
        env:
          BASE_URL: http://localhost:3000
          DATABASE_URL: postgresql://test:test@localhost:5432/smart-menu-test
          JWT_SECRET: test-secret-for-ci-min-32-chars-long
          NEXT_PUBLIC_DOMAIN: http://localhost:3000
