version: '3.8'

services:
  smart-menu:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_DOMAIN=${NEXT_PUBLIC_DOMAIN:-http://localhost:3000}
    volumes:
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
