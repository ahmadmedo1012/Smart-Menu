<svg xmlns="http://www.w3.org/2000/svg" width="540" height="1170" viewBox="0 0 540 1170">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(212,168,83,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="40%">
      <stop offset="0%" stop-color="rgba(212,168,83,0.05)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="540" height="1170" fill="url(#bg)"/>
  <rect width="540" height="1170" fill="url(#glow1)"/>
  <rect width="540" height="1170" fill="url(#glow2)"/>

  <!-- Restaurant header -->
  <text x="50" y="200" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="end">مطعم الذهبي</text>
  <circle cx="280" cy="218" r="4" fill="#22c55e"/>
  <text x="290" y="223" font-family="system-ui, sans-serif" font-size="12" fill="rgba(34,197,94,0.7)" text-anchor="start">مفتوح الآن</text>

  <!-- Menu items -->
  <g transform="translate(40, 380)">
    <rect x="0" y="0" width="460" height="50" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="440" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#d4a853" text-anchor="end">25 د.ل</text>
    <text x="430" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="end">شاورما دجاج</text>
    <text x="430" y="40" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="end">خبز صاج • ثوم • مخلل</text>
  </g>

  <g transform="translate(40, 440)">
    <rect x="0" y="0" width="460" height="50" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="440" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#d4a853" text-anchor="end">30 د.ل</text>
    <text x="430" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="end">كباب بندورة</text>
    <text x="430" y="40" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="end">لحم مفروم • بندورة • بصل</text>
  </g>

  <g transform="translate(40, 500)">
    <rect x="0" y="0" width="460" height="50" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="440" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#d4a853" text-anchor="end">15 د.ل</text>
    <text x="430" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="end">فتوش</text>
    <text x="430" y="40" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="end">خس • بندورة • نعناع • خبز</text>
  </g>

  <!-- Brand mark -->
  <text x="270" y="1100" font-family="system-ui, sans-serif" font-size="10" fill="#d4a853" text-anchor="middle" opacity="0.25" letter-spacing="3">الربط الذكي</text>
</svg>
