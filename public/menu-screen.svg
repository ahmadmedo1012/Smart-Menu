  <rect x="286" y="174" width="72" height="56" rx="4" fill="#222"/>
  <text x="232" y="190" font-family="AloaaxB, sans-serif" font-size="14" font-weight="500" fill="white" direction="rtl">اسبريسو مزدوج</text>
  <text x="248" y="210" font-family="system-ui" font-size="12" fill="#8A8A93" direction="rtl">اسبريسو مركز طبقة مزدوجة</text>
  <text x="232" y="230" font-family="system-ui" font-size="13" font-weight="600" fill="#f66d0f">12 د.ل</text>
