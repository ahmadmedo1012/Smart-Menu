  <text x="254" y="298" font-family="system-ui" font-size="12" fill="#8A8A93" direction="rtl">مع حليب طازج وثلج</text>
  <text x="238" y="318" font-family="system-ui" font-size="13" font-weight="600" fill="#f66d0f">15 د.ل</text>
  <!-- Item 3 -->
